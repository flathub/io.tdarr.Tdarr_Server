app-id: io.tdarr.Tdarr_Server
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: tdarr-server-flatpak
separate-locales: false

finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=xdg-videos
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/doc
  - /share/gtk-doc
  - /share/man

modules:
  - shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json
  - name: leptonica
    buildsystem: autotools
    config-opts:
      - --disable-static
    sources:
      - type: archive
        url: https://github.com/DanBloomberg/leptonica/releases/download/1.79.0/leptonica-1.79.0.tar.gz
        sha256: 045966c9c5d60ebded314a9931007a56d9d2f7a6ac39cb5cc077c816f62300d8
    cleanup:
      - /bin

  - name: tesseract
    buildsystem: simple
    build-options:
      env:
        PKG_CONFIG_PATH: /app/lib/pkgconfig:/usr/lib/pkgconfig
    build-commands:
      - ./autogen.sh
      - CXXFLAGS="${CXXFLAGS:-} -include cstdint" ./configure --prefix=/app --disable-static --disable-graphics --disable-opencl
      - sed -i 's/-march=native -mtune=native//g' src/arch/Makefile
      - make -j${FLATPAK_BUILDER_N_JOBS}
      - make install
    sources:
      - type: archive
        url: https://github.com/tesseract-ocr/tesseract/archive/refs/tags/4.1.1.tar.gz
        sha256: 2a66ff0d8595bff8f04032165e6c936389b1e5727c3ce5a27b3e059d218db1cb
    cleanup:
      - /bin
      - /share/tessdata

  - name: perl
    buildsystem: simple
    build-options:
      # Perl's installed tree fails flatpak-builder debugedit/eu-strip in rofiles.
      no-debuginfo: true
    build-commands:
      - ./Configure -des -Dprefix=/app -Dvendorprefix=/app -Dsiteprefix=/app -Duseshrplib -Duseithreads -Duselargefiles -Dman1dir=none -Dman3dir=none
      - make -j${FLATPAK_BUILDER_N_JOBS}
      - make install
      - install -Dm755 perl /app/bin/perl
    sources:
      - type: archive
        url: https://www.cpan.org/src/5.0/perl-5.42.2.tar.xz
        sha256: 0a585eeb9e363c0f80482ddb3571625250c2c86aeb408853e8ea50805cfb14bb
    cleanup:
      - /share

  - name: tdarr-server
    buildsystem: simple
    build-commands:
      - mkdir -p /app/tdarr/server
      - cp -a . /app/tdarr/server/
      - chmod +x /app/tdarr/server/Tdarr_Server
      - chmod +x /app/tdarr/server/Tdarr_Server_Tray
      - chmod +x /app/tdarr/server/runtime/Tdarr_Server_Runtime
      - chmod +x /app/tdarr/server/runtime/pnpm
      - chmod +x /app/tdarr/server/node_modules/exiftool-vendored.pl/bin/exiftool
      - >-
        sed -i 's|const env = { \.\.\.o.exiftoolEnv, LANG: "C" };|const env = { PATH: process.env.PATH, HOME: process.env.HOME, ...o.exiftoolEnv, LANG: "C" };|' /app/tdarr/server/node_modules/exiftool-vendored/dist/ExifTool.js
    sources:
      - type: archive
        url: https://storage.tdarr.io/versions/2.71.01/linux_x64/Tdarr_Server.zip
        sha256: 5721c8e06e073fe2f5d8734b5d4a4668ad400bc5875c3a16b03263b435da4b62
        strip-components: 0
      - type: patch
        path: patches/exiftool-flatpak-perl.patch

  - name: tdarr-server-integration
    buildsystem: simple
    build-commands:
      - install -Dm755 tdarr-server-flatpak /app/bin/tdarr-server-flatpak
      - install -Dm644 io.tdarr.Tdarr_Server.desktop /app/share/applications/io.tdarr.Tdarr_Server.desktop
      - install -Dm644 io.tdarr.Tdarr_Server.metainfo.xml /app/share/metainfo/io.tdarr.Tdarr_Server.metainfo.xml
      - install -Dm644 logo512.png /app/share/icons/hicolor/512x512/apps/io.tdarr.Tdarr_Server.png
      - install -Dm644 LICENSE.md /app/share/licenses/io.tdarr.Tdarr_Server/LICENSE.md
    sources:
      - type: file
        path: wrappers/tdarr-server-flatpak
      - type: file
        url: https://raw.githubusercontent.com/HaveAGitGat/Tdarr/4210e9224e2c426ed673ca621a73b1fef6dddae2/flatpak/io.tdarr.Tdarr_Server.desktop
        sha256: 611af708f6fccda96d21d1116195e2c42dd8a31068600d51eb73fed94dfb2ae3
      - type: file
        url: https://raw.githubusercontent.com/HaveAGitGat/Tdarr/4210e9224e2c426ed673ca621a73b1fef6dddae2/flatpak/io.tdarr.Tdarr_Server.metainfo.xml
        sha256: de235f14098789ffa771d8455ebca8d228a9e4cd4a1b9a6107a39a91b26b72be
      - type: file
        url: https://raw.githubusercontent.com/HaveAGitGat/Tdarr/4210e9224e2c426ed673ca621a73b1fef6dddae2/flatpak/io.tdarr.Tdarr_Server.png
        sha256: 91106d113a447207ac83e5aabc930fc7d782ddac7c63e8966dce99e7c826bcbc
        dest-filename: logo512.png
      - type: file
        url: https://raw.githubusercontent.com/HaveAGitGat/Tdarr/4210e9224e2c426ed673ca621a73b1fef6dddae2/LICENSE.md
        sha256: 0dede92d4421de2668e268783a03c5834078f81a8c694f59900e43a40528c4cf
        dest-filename: LICENSE.md
